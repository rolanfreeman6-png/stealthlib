job1:
  stage: s1
  image: ubuntu:24.04
  script: echo j1

job2:
  stage: s2
  image: ubuntu:24.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq clang clang-tidy cmake make ninja-build
  script:
    - cmake -S . -B build -G Ninja -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_BUILD_TYPE=Release
    - "clang-tidy -p build examples/game_protection.cpp > tidy.log 2>&1"

