stages:
  - build-gcc
  - build-clang
  - strict-warnings
  - asan-ubsan
  - tsan
  - msan
  - clang-tidy
  - cppcheck
  - coverage
  - semgrep
  - mutation
  - fuzz-hashes
  - fuzz-strings
  - fuzz-decoders

variables:
  BUILD_KEY: "0xC0FFEE42DEADBEEFULL"

build-gcc:
  stage: build-gcc
  image: ubuntu:24.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq g++ cmake make python3
  script:
    - cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSTEALTH_BUILD_EXAMPLES=ON -DSTEALTH_BUILD_TESTS=ON -DSTEALTH_BUILD_FIXTURES=ON -DSTEALTH_BUILD_KEY=$BUILD_KEY
    - cmake --build build --parallel 4
    - cd build && ctest --output-on-failure

build-clang:
  stage: build-clang
  image: ubuntu:24.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq clang cmake make python3
  script:
    - cmake -S . -B build -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=Release -DSTEALTH_BUILD_EXAMPLES=ON -DSTEALTH_BUILD_TESTS=ON -DSTEALTH_BUILD_FIXTURES=ON -DSTEALTH_BUILD_KEY=$BUILD_KEY
    - cmake --build build --parallel 4
    - cd build && ctest --output-on-failure

strict-warnings:
  stage: strict-warnings
  image: ubuntu:24.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq g++ cmake make
  script:
    - export WARN_FLAGS="-Werror -Wshadow -Wconversion -Wsign-conversion"
    - cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSTEALTH_BUILD_TESTS=ON -DSTEALTH_BUILD_EXAMPLES=OFF -DSTEALTH_BUILD_FIXTURES=OFF -DCMAKE_CXX_FLAGS="$WARN_FLAGS"
    - cmake --build build --parallel 4

asan-ubsan:
  stage: asan-ubsan
  image: ubuntu:24.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq clang cmake make python3
  script:
    - export SAN_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer -g"
    - cmake -S . -B build -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="$SAN_FLAGS" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" -DSTEALTH_BUILD_TESTS=ON -DSTEALTH_BUILD_EXAMPLES=OFF -DSTEALTH_BUILD_FIXTURES=ON -DSTEALTH_BUILD_KEY=$BUILD_KEY
    - cmake --build build --parallel 4
    - cd build && ctest --output-on-failure

tsan:
  stage: tsan
  image: ubuntu:24.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq clang cmake make
  script:
    - export TSAN_FLAGS="-fsanitize=thread -g -O1"
    - cmake -S . -B build -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="$TSAN_FLAGS" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread" -DSTEALTH_BUILD_TESTS=ON -DSTEALTH_BUILD_EXAMPLES=OFF -DSTEALTH_BUILD_FIXTURES=OFF -DSTEALTH_BUILD_KEY=$BUILD_KEY
    - cmake --build build --parallel 4
    - cd build && ./tests/test_concurrent_decrypt

msan:
  stage: msan
  image: ubuntu:24.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq clang
  script:
    - export MSAN_FLAGS="-fsanitize=memory -fsanitize-memory-track-origins -fno-omit-frame-pointer -g -O1"
    - clang++ -std=c++20 $MSAN_FLAGS -DSTEALTH_BUILD_KEY=$BUILD_KEY -I . tests/portable_smoke_test.cpp -o msan_test -lpthread
    - ./msan_test && rm -f msan_test
    - clang++ -std=c++20 $MSAN_FLAGS -DSTEALTH_BUILD_KEY=$BUILD_KEY -I . tests/string_test.cpp -o msan_test -lpthread
    - ./msan_test && rm -f msan_test
    - clang++ -std=c++20 $MSAN_FLAGS -DSTEALTH_BUILD_KEY=$BUILD_KEY -I . tests/test_sse2_parity.cpp -o msan_test -lpthread
    - ./msan_test && rm -f msan_test
    - clang++ -std=c++20 $MSAN_FLAGS -DSTEALTH_BUILD_KEY=$BUILD_KEY -I . tests/test_concurrent_decrypt.cpp -o msan_test -lpthread
    - ./msan_test && rm -f msan_test

clang-tidy:
  stage: clang-tidy
  image: ubuntu:24.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq clang clang-tidy cmake make ninja-build
  script:
    - cmake -S . -B build -G Ninja -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_BUILD_TYPE=Release -DSTEALTH_BUILD_TESTS=ON -DSTEALTH_BUILD_EXAMPLES=ON -DSTEALTH_BUILD_FIXTURES=ON -DSTEALTH_BUILD_KEY=$BUILD_KEY
    - "clang-tidy -p build examples/game_protection.cpp > tidy.log 2>&1 || true"
    - cat tidy.log

cppcheck:
  stage: cppcheck
  image: ubuntu:24.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq cppcheck
  script:
    - "cppcheck --enable=all --inline-suppr --suppress=missingIncludeSystem --suppress=unusedFunction -I stealthlib --std=c++20 stealthlib/ tests/ examples/ > cppcheck.log 2>&1 || true"
    - cat cppcheck.log

coverage:
  stage: coverage
  image: ubuntu:24.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq g++ cmake make python3 lcov
  script:
    - export COV_FLAGS="--coverage -O0 -g -fprofile-update=atomic"
    - cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="$COV_FLAGS" -DCMAKE_EXE_LINKER_FLAGS="--coverage" -DSTEALTH_BUILD_TESTS=ON -DSTEALTH_BUILD_EXAMPLES=OFF -DSTEALTH_BUILD_FIXTURES=ON -DSTEALTH_BUILD_KEY=$BUILD_KEY
    - cmake --build build --parallel 4
    - cd build && ctest && cd ..
    - lcov --capture --directory build --output-file lcov.info --ignore-errors negative
    - "lcov --remove lcov.info /usr/* tests/* third_party/* --output-file lcov_filtered.info --ignore-errors unused"
    - lcov --summary lcov_filtered.info
  artifacts:
    paths:
      - lcov.info
      - lcov_filtered.info

fuzz-hashes:
  stage: fuzz-hashes
  image: ubuntu:24.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq clang cmake ninja-build
  script:
    - export FUZZ_FLAGS="-fsanitize=fuzzer,address,undefined;-fno-sanitize-recover=all;-fno-omit-frame-pointer"
    - cmake -S . -B build -G Ninja -DCMAKE_CXX_COMPILER=clang++ -DSTEALTH_BUILD_TESTS=ON -DSTEALTH_BUILD_EXAMPLES=OFF -DSTEALTH_BUILD_BENCHMARK=OFF -DSTEALTH_BUILD_FIXTURES=OFF -DSTEALTH_BUILD_FUZZER=ON -DSTEALTH_FUZZ_FLAGS="$FUZZ_FLAGS" -DSTEALTH_LIBFUZZER_LINKED=ON -DSTEALTH_BUILD_KEY=$BUILD_KEY
    - cmake --build build --target fuzz_hashes --parallel
    - ./build/tests/fuzz_hashes -max_total_time=3600 -print_final_stats=1

fuzz-strings:
  stage: fuzz-strings
  image: ubuntu:24.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq clang cmake ninja-build
  script:
    - export FUZZ_FLAGS="-fsanitize=fuzzer,address,undefined;-fno-sanitize-recover=all;-fno-omit-frame-pointer"
    - cmake -S . -B build -G Ninja -DCMAKE_CXX_COMPILER=clang++ -DSTEALTH_BUILD_TESTS=ON -DSTEALTH_BUILD_EXAMPLES=OFF -DSTEALTH_BUILD_BENCHMARK=OFF -DSTEALTH_BUILD_FIXTURES=OFF -DSTEALTH_BUILD_FUZZER=ON -DSTEALTH_FUZZ_FLAGS="$FUZZ_FLAGS" -DSTEALTH_LIBFUZZER_LINKED=ON -DSTEALTH_BUILD_KEY=$BUILD_KEY
    - cmake --build build --target fuzz_strings --parallel
    - ./build/tests/fuzz_strings -max_total_time=3600 -print_final_stats=1

fuzz-decoders:
  stage: fuzz-decoders
  image: ubuntu:24.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq clang cmake ninja-build
  script:
    - export FUZZ_FLAGS="-fsanitize=fuzzer,address,undefined;-fno-sanitize-recover=all;-fno-omit-frame-pointer"
    - cmake -S . -B build -G Ninja -DCMAKE_CXX_COMPILER=clang++ -DSTEALTH_BUILD_TESTS=ON -DSTEALTH_BUILD_EXAMPLES=OFF -DSTEALTH_BUILD_BENCHMARK=OFF -DSTEALTH_BUILD_FIXTURES=OFF -DSTEALTH_BUILD_FUZZER=ON -DSTEALTH_FUZZ_FLAGS="$FUZZ_FLAGS" -DSTEALTH_LIBFUZZER_LINKED=ON -DSTEALTH_BUILD_KEY=$BUILD_KEY
    - cmake --build build --target fuzz_decoders --parallel
    - ./build/tests/fuzz_decoders -max_total_time=3600 -print_final_stats=1

semgrep:
  stage: semgrep
  image: returntocorp/semgrep
  script:
    - "semgrep scan --config=p/c++ --config=p/security-audit --json > semgrep_results.json || true"
    - cat semgrep_results.json
  artifacts:
    paths:
      - semgrep_results.json
    when: always

mutation:
  stage: mutation
  image: ubuntu:24.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq g++ bc
  script:
    - export KEY="-DSTEALTH_BUILD_KEY=$BUILD_KEY"
    - export INC="-I . -I tests/third_party"
    - export FLAGS="-std=c++20 -O1 $KEY $INC"
    - export FAST="string_test portable_smoke_test"
    - total=0; killed=0; survived=0
    - |
      run_mut() {
        total=$((total + 1))
        cp "$2" /tmp/mut_bak.hpp
        sed -i "s|$3|$4|g" "$2" 2>/dev/null
        if [ $? -ne 0 ]; then total=$((total-1)); cp /tmp/mut_bak.hpp "$2"; return; fi
        any_fail=0; any_compile=0
        for t in $FAST; do
          if g++ $FLAGS tests/${t}.cpp -o /tmp/${t}_m 2>/dev/null; then
            any_compile=1
            /tmp/${t}_m >/dev/null 2>&1
            if [ $? -ne 0 ]; then any_fail=1; fi
            rm -f /tmp/${t}_m
          fi
        done
        if [ $any_compile -eq 0 ]; then killed=$((killed+1))
        elif [ $any_fail -eq 1 ]; then killed=$((killed+1))
        else survived=$((survived+1)); fi
        cp /tmp/mut_bak.hpp "$2"
      }
    - run_mut "enc_xor" "stealthlib/detail/encryption.hpp" "b \^= static_cast<uint8_t>(var_mask" "b += static_cast<uint8_t>(var_mask"
    - run_mut "enc_mask" "stealthlib/detail/encryption.hpp" "0xA5,0xB6,0xC7,0xD8" "0x00,0xB6,0xC7,0xD8"
    - run_mut "hash_fnv_prime" "stealthlib/detail/hashes.hpp" "0x100000001B3ULL" "0x100000001B4ULL"
    - run_mut "hash_fnv_basis" "stealthlib/detail/hashes.hpp" "0xCBF29CE484222325ULL" "0xCBF29CE484222326ULL"
    - run_mut "hash_djb2_shift" "stealthlib/detail/hashes.hpp" "(h << 5) + h" "(h << 4) + h"
    - run_mut "sha_K0" "stealthlib/detail/sha256.hpp" "0x428a2f98" "0x428a2f99"
    - run_mut "sha_h0" "stealthlib/detail/sha256.hpp" "h\[0\]=0x6a09e667" "h[0]=0x6a09e668"
    - run_mut "sha_bits" "stealthlib/detail/sha256.hpp" "total_bytes \* 8" "total_bytes * 4"
    - run_mut "mem_zero" "stealthlib/memory/memory.hpp" "\*p\+\+ = 0" "*p++ = 1"
    - run_mut "mem_cmp" "stealthlib/memory/memory.hpp" "return diff == 0" "return diff != 0"
    - run_mut "enc_b64" "stealthlib/encoding/encoding.hpp" "\"ABCDEFGHIJKLMNOPQRSTUVWXYZ" "\"BBCDEFGHIJKLMNOPQRSTUVWXYZ"
    - run_mut "enc_hex" "stealthlib/encoding/encoding.hpp" "\"0123456789ABCDEF\"" "\"1123456789ABCDEF\""
    - run_mut "enc_rot13" "stealthlib/encoding/encoding.hpp" "(ch - 'a' + 13) % 26" "(ch - 'a' + 14) % 26"
    - run_mut "enc_xor_crypt" "stealthlib/encoding/encoding.hpp" "d\[i\] \^= key\[i\]" "d[i] += key[i]"
    - run_mut "sha_offby1" "stealthlib/detail/sha256.hpp" "i < 16" "i <= 16"
    - run_mut "sha_offby1_64" "stealthlib/detail/sha256.hpp" "i < 64" "i <= 64"
    - run_mut "b64_remove_check" "stealthlib/encoding/encoding.hpp" "if (str.size() % 4 != 0) return std::nullopt;" "/* removed */"
    - run_mut "hex_remove_check" "stealthlib/encoding/encoding.hpp" "if (str.size() % 2 != 0) return std::nullopt;" "/* removed */"
    - run_mut "sha_delete_block" "stealthlib/detail/sha256.hpp" "process_block(buf);" "/* deleted */"
    - run_mut "sha_double_pad" "stealthlib/detail/sha256.hpp" "buf\[buf_used++\] = 0x80" "buf[buf_used++] = 0x80; buf[buf_used++] = 0x80"
    - echo "MUTATION_TOTAL=$total KILLED=$killed SURVIVED=$survived"
    - echo "MUTATION_SCORE=$(echo "scale=1; $killed * 100 / $total" | bc)%"
  artifacts:
    paths:
      - mutation_results.txt
    when: always
