stages:
  - build
  - sanitize

variables:
  BUILD_KEY: "0xC0FFEE42DEADBEEFULL"

build-gcc:
  stage: build
  image: ubuntu:24.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq g++ cmake make python3
  script:
    - cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSTEALTH_BUILD_EXAMPLES=ON -DSTEALTH_BUILD_TESTS=ON -DSTEALTH_BUILD_FIXTURES=ON -DSTEALTH_BUILD_KEY=$BUILD_KEY
    - cmake --build build --parallel 4
    - cd build && ctest --output-on-failure

asan-ubsan:
  stage: sanitize
  image: ubuntu:24.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq clang cmake make python3
  script:
    - export CMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer -g"
    - cmake -S . -B build -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="$CMAKE_CXX_FLAGS" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" -DSTEALTH_BUILD_TESTS=ON -DSTEALTH_BUILD_EXAMPLES=OFF -DSTEALTH_BUILD_FIXTURES=ON -DSTEALTH_BUILD_KEY=$BUILD_KEY
    - cmake --build build --parallel 4
    - cd build && ctest --output-on-failure
