# SonarCloud configuration for StealthLib
sonar.projectKey=rolanfreeman6-png_stealthlib
sonar.organization=rolanfreeman6-png

# Source directories — exclude shell scripts, build dirs, tools
sonar.sources=stealthlib,tests,examples,benchmark
sonar.exclusions=tests/third_party/**,**/doctest.h,build_*,**/*.obj,**/*.pdb,tools/**,**/*.sh,**/*.bat

# C++ specific
sonar.cfamily.compile-commands=build/compile_commands.json
sonar.cfamily.cpp.version=20

# Coverage
sonar.coverage.exclusions=tests/**,examples/**,benchmark/**,tests/third_party/**,tools/**
sonar.coverageReportPaths=coverage.xml

# Domain-specific rule suppressions:
# - S5945: C-style char arrays — REQUIRED for consteval literal types (std::string is not consteval)
# - S6022: std::byte — not constexpr-compatible on all compilers
# - S1709: explicit on consteval ctor — would break S() macro
# - S3230: redundant initializer — explicit for clarity
# - S6168: std::jthread — not available on all target compilers
# - S3776: cognitive complexity — test functions are intentionally linear
# - S134: nesting depth — test functions have nested assertions
# - S1188: lambda length — test lambdas contain assertions
# - S3608: explicit capture — test lambdas capture by reference
# - S8417: memory_order — acquire/release is intentional for start-gun pattern
# - S6004: init-statement — style preference, not a bug
# - S1659: multiple declarations — compact PE struct definitions
# - S3574: redundant return type — trailing return type in lambda
sonar.cfamily.ruleset=false

# Issue filters — suppress domain-specific code smells
sonar.issues.ignoreMulticriteria=\
  cpp:S5945,\
  cpp:S6022,\
  cpp:S1709,\
  cpp:S3230,\
  cpp:S6168,\
  cpp:S3776,\
  cpp:S134,\
  cpp:S1188,\
  cpp:S3608,\
  cpp:S8417,\
  cpp:S6004,\
  cpp:S1659,\
  cpp:S3574
