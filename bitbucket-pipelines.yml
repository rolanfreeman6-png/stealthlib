pipelines:
  default:
    - parallel:
      - step:
          name: Build GCC + Test
          image: gcc:13
          script:
            - apt-get update -qq && apt-get install -y -qq cmake make python3
            - cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSTEALTH_BUILD_EXAMPLES=ON -DSTEALTH_BUILD_TESTS=ON -DSTEALTH_BUILD_FIXTURES=ON -DSTEALTH_BUILD_KEY=0xC0FFEE42DEADBEEFULL
            - cmake --build build --parallel 4
            - cd build && ctest --output-on-failure
      - step:
          name: Build Clang + Test
          image: ubuntu:24.04
          script:
            - apt-get update -qq && apt-get install -y -qq clang cmake make python3
            - cmake -S . -B build -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=Release -DSTEALTH_BUILD_EXAMPLES=ON -DSTEALTH_BUILD_TESTS=ON -DSTEALTH_BUILD_FIXTURES=ON -DSTEALTH_BUILD_KEY=0xC0FFEE42DEADBEEFULL
            - cmake --build build --parallel 4
            - cd build && ctest --output-on-failure
      - step:
          name: Strict Warnings
          image: gcc:13
          script:
            - apt-get update -qq && apt-get install -y -qq cmake make
            - export WARN_FLAGS="-Werror -Wshadow -Wconversion -Wsign-conversion"
            - cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DSTEALTH_BUILD_TESTS=ON -DSTEALTH_BUILD_EXAMPLES=OFF -DSTEALTH_BUILD_FIXTURES=OFF -DCMAKE_CXX_FLAGS="$WARN_FLAGS"
            - cmake --build build --parallel 4

  branches:
    main:
      - parallel:
        - step:
            name: ASan + UBSan
            image: ubuntu:24.04
            script:
              - apt-get update -qq && apt-get install -y -qq clang cmake make python3
              - export SAN_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer -g"
              - cmake -S . -B build -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="$SAN_FLAGS" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" -DSTEALTH_BUILD_TESTS=ON -DSTEALTH_BUILD_EXAMPLES=OFF -DSTEALTH_BUILD_FIXTURES=ON -DSTEALTH_BUILD_KEY=0xC0FFEE42DEADBEEFULL
              - cmake --build build --parallel 4
              - cd build && ctest --output-on-failure
        - step:
            name: TSan
            image: ubuntu:24.04
            script:
              - apt-get update -qq && apt-get install -y -qq clang cmake make
              - export TSAN_FLAGS="-fsanitize=thread -g -O1"
              - cmake -S . -B build -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="$TSAN_FLAGS" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread" -DSTEALTH_BUILD_TESTS=ON -DSTEALTH_BUILD_EXAMPLES=OFF -DSTEALTH_BUILD_FIXTURES=OFF -DSTEALTH_BUILD_KEY=0xC0FFEE42DEADBEEFULL
              - cmake --build build --parallel 4
              - cd build && ./tests/test_concurrent_decrypt
              - ./tests/test_deterministic_concurrency
        - step:
            name: MSan
            image: ubuntu:24.04
            script:
              - apt-get update -qq && apt-get install -y -qq clang
              - export MSAN_FLAGS="-fsanitize=memory -fsanitize-memory-track-origins -fno-omit-frame-pointer -g -O1"
              - clang++ -std=c++20 $MSAN_FLAGS -DSTEALTH_BUILD_KEY=0xC0FFEE42DEADBEEFULL -I . tests/portable_smoke_test.cpp -o msan_test -lpthread
              - ./msan_test && rm -f msan_test
              - clang++ -std=c++20 $MSAN_FLAGS -DSTEALTH_BUILD_KEY=0xC0FFEE42DEADBEEFULL -I . tests/string_test.cpp -o msan_test -lpthread
              - ./msan_test && rm -f msan_test
        - step:
            name: clang-tidy
            image: ubuntu:24.04
            script:
              - apt-get update -qq && apt-get install -y -qq clang clang-tidy cmake make ninja-build
              - cmake -S . -B build -G Ninja -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_BUILD_TYPE=Release -DSTEALTH_BUILD_TESTS=ON -DSTEALTH_BUILD_EXAMPLES=ON -DSTEALTH_BUILD_FIXTURES=ON -DSTEALTH_BUILD_KEY=0xC0FFEE42DEADBEEFULL
              - "clang-tidy -p build examples/game_protection.cpp > tidy.log 2>&1 || true"
              - cat tidy.log
        - step:
            name: cppcheck
            image: ubuntu:24.04
            script:
              - apt-get update -qq && apt-get install -y -qq cppcheck
              - "cppcheck --enable=all --inline-suppr --suppress=missingIncludeSystem --suppress=unusedFunction -I stealthlib --std=c++20 stealthlib/ tests/ examples/ > cppcheck.log 2>&1 || true"
              - cat cppcheck.log
        - step:
            name: Coverage
            image: gcc:13
            script:
              - apt-get update -qq && apt-get install -y -qq cmake make python3 lcov
              - export COV_FLAGS="--coverage -O0 -g"
              - cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="$COV_FLAGS" -DCMAKE_EXE_LINKER_FLAGS="--coverage" -DSTEALTH_BUILD_TESTS=ON -DSTEALTH_BUILD_EXAMPLES=OFF -DSTEALTH_BUILD_FIXTURES=ON -DSTEALTH_BUILD_KEY=0xC0FFEE42DEADBEEFULL
              - cmake --build build --parallel 4
              - cd build && ctest && cd ..
              - lcov --capture --directory build --output-file lcov.info --ignore-errors negative
              - "lcov --remove lcov.info /usr/* tests/* third_party/* --output-file lcov_filtered.info --ignore-errors unused"
              - lcov --summary lcov_filtered.info
              - curl -s https://codecov.io/bash | bash
            artifacts:
              - lcov.info
              - lcov_filtered.info
      - step:
          name: Mull Mutation Testing
          image: ubuntu:24.04
          script:
            - apt-get update -qq && apt-get install -y -qq wget clang-18 llvm-18-dev libllvm18 g++ bc file
            - wget -qL -O /tmp/mull.deb "https://github.com/mull-project/mull/releases/download/0.34.0/Mull-18-0.34.0-LLVM-18.1.3-ubuntu-amd64-24.04.deb" || true
            - dpkg -i /tmp/mull.deb 2>&1 || apt-get install -y -f -qq 2>&1 || true
            - which mull-instrument-18 2>/dev/null && echo "Mull installed!" || echo "Mull not found — fallback to manual"
            - export KEY="-DSTEALTH_BUILD_KEY=0xC0FFEE42DEADBEEFULL" INC="-I . -I tests/third_party"
            - clang++-18 -emit-llvm -c -std=c++20 -O0 -g $KEY $INC tests/portable_smoke_test.cpp -o smoke.bc 2>/dev/null && mull-instrument-18 smoke.bc -o smoke_mut.bc 2>/dev/null && clang++-18 smoke_mut.bc -o smoke_mull -lpthread 2>/dev/null && mull-runner-18 smoke_mull --reporters=IDE --timeout=10000 > mutation_results.txt 2>&1 || true
            - if [ ! -s mutation_results.txt ]; then chmod +x tools/mutation_test.sh && ./tools/mutation_test.sh > mutation_results.txt 2>&1 || true; fi
            - cat mutation_results.txt
          artifacts:
            - mutation_results.txt
      - step:
          name: Semgrep SAST
          image: returntocorp/semgrep
          script:
            - "semgrep scan --config=p/c++ --config=p/security-audit --json > semgrep_results.json || true"
            - cat semgrep_results.json
          artifacts:
            - semgrep_results.json
