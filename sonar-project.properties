# SonarCloud configuration for StealthLib
sonar.projectKey=rolanfreeman6-png_stealthlib
sonar.organization=rolanfreeman6-png
sonar.projectName=stealthlib
sonar.projectVersion=2.2.0

# Source directories
sonar.sources=stealthlib,tests,examples,benchmark

# Exclude third-party code from analysis
sonar.exclusions=tests/third_party/**,**/doctest.h,build_*,**/*.obj,**/*.pdb

# C++ specific
sonar.cfamily.compile-commands=build/compile_commands.json

# Coverage
sonar.coverage.exclusions=tests/**,examples/**,benchmark/**,tests/third_party/**

# C++ version
sonar.cfamily.cpp.version=20

# Thread count for analysis
sonar.cfamily.threads=2

# Disable analysis of generated files
sonar.exclusions+=**/build_*/**,**/*.generated.*
