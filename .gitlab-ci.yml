stages:
  - s1
  - s2
  - s3
  - s4
  - s5
  - s6

variables:
  BUILD_KEY: "0xC0FFEE42DEADBEEFULL"

job1:
  stage: s1
  image: ubuntu:24.04
  script: echo j1

job2:
  stage: s2
  image: ubuntu:24.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq clang clang-tidy cmake make ninja-build
  script:
    - cmake -S . -B build -G Ninja -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_BUILD_TYPE=Release
    - "clang-tidy -p build examples/game_protection.cpp > tidy.log 2>&1"

job3:
  stage: s3
  image: ubuntu:24.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq cppcheck
  script:
    - "cppcheck --enable=all --inline-suppr --suppress=missingIncludeSystem --suppress=unusedFunction -I stealthlib --std=c++20 stealthlib/ tests/ examples/ > cppcheck.log 2>&1"

job4:
  stage: s4
  image: ubuntu:24.04
  script: echo j4

job5:
  stage: s5
  image: ubuntu:24.04
  script: echo j5

job6:
  stage: s6
  image: ubuntu:24.04
  script: echo j6
