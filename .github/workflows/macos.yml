name: macOS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  macos-clang:
    name: macOS Clang
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Configure CMake
        run: |
          mkdir build
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DSTEALTH_BUILD_EXAMPLES=ON \
            -DSTEALTH_BUILD_TESTS=ON \
            -DSTEALTH_BUILD_BENCHMARK=OFF
      - name: Build
        run: cmake --build build --parallel
      - name: Run tests
        run: cd build && ctest --output-on-failure
