name: Coverity Scan

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  coverity:
    name: Coverity Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make python3 wget curl
      - name: Download and extract Coverity Build Tool
        run: |
          wget --no-verbose \
            "https://scan.coverity.com/download/cxx/linux64?token=${{ secrets.COVERITY_TOKEN }}&project=rolanfreeman6-png%2Fstealthlib" \
            -O cov-analysis.tar.gz
          tar xzf cov-analysis.tar.gz
          # Find the extracted directory (name varies by version)
          COV_DIR=$(find . -maxdepth 1 -type d -name "cov-analysis*" | head -1)
          echo "Coverity dir: $COV_DIR"
          echo "$(pwd)/$COV_DIR/bin" >> $GITHUB_PATH
          echo "COV_BIN=$(pwd)/$COV_DIR/bin" >> $GITHUB_ENV
      - name: Build with cov-build
        run: |
          $COV_BIN/cov-build --help 2>&1 | head -1
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DSTEALTH_BUILD_EXAMPLES=ON -DSTEALTH_BUILD_TESTS=ON \
            -DSTEALTH_BUILD_FIXTURES=ON \
            -DSTEALTH_BUILD_KEY=0xC0FFEE42DEADBEEFULL
          $COV_BIN/cov-build --dir cov-int cmake --build build --parallel 4
      - name: Submit to Coverity Scan
        run: |
          tar czvf stealthlib.tgz cov-int
          curl --form token=${{ secrets.COVERITY_TOKEN }} \
               --form email=rolanfreeman6@users.noreply.github.com \
               --form file=@stealthlib.tgz \
               --form version="v2.2.0" \
               --form description="StealthLib v2.2.0 Coverity Scan" \
               "https://scan.coverity.com/builds?project=rolanfreeman6-png%2Fstealthlib"
