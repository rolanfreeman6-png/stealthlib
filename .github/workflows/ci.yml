name: CI

# GitHub CI: fast build+test checks only (~2 min total).
# Heavy CI (fuzzing 4h, MSan, coverage, clang-tidy, cppcheck, TSan 100x)
# runs on GitLab (.gitlab-ci.yml) with Ultimate trial.

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  windows-msvc:
    name: Windows MSVC
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Configure CMake
        shell: bash
        run: |
          mkdir build
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 \
            -DSTEALTH_BUILD_EXAMPLES=ON -DSTEALTH_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --config Release --parallel 2
      - name: Run tests
        shell: bash
        run: cd build && ctest -C Release --output-on-failure

  linux-gcc:
    name: Linux GCC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: sudo apt-get update && sudo apt-get install -y g++-13 cmake
      - name: Configure CMake
        run: |
          mkdir build && cmake -S . -B build \
            -DCMAKE_CXX_COMPILER=g++-13 \
            -DSTEALTH_BUILD_EXAMPLES=ON -DSTEALTH_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Run tests
        run: cd build && ctest --output-on-failure

  macos-clang:
    name: macOS Clang
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Configure CMake
        run: |
          mkdir build
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DSTEALTH_BUILD_EXAMPLES=ON -DSTEALTH_BUILD_TESTS=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Run tests
        run: cd build && ctest --output-on-failure
