name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  repo-metadata:
    name: Repository metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check GitHub description
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/check_github_description.py

  windows-msvc:
    name: Windows MSVC (Release)
    runs-on: windows-latest
    needs: repo-metadata
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DSTEALTH_BUILD_EXAMPLES=ON -DSTEALTH_BUILD_TESTS=ON -DSTEALTH_BUILD_BENCHMARK=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Run tests
        run: ctest --test-dir build -C Release --output-on-failure

  windows-relwithdebinfo-msvc:
    name: Windows MSVC (RelWithDebInfo) + binary scan
    runs-on: windows-latest
    needs: repo-metadata
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DSTEALTH_BUILD_EXAMPLES=OFF -DSTEALTH_BUILD_TESTS=ON -DSTEALTH_BUILD_BENCHMARK=OFF

      - name: Build
        run: cmake --build build --config RelWithDebInfo

      - name: Run tests
        run: ctest --test-dir build -C RelWithDebInfo --output-on-failure

  windows-clang:
    name: Windows Clang + Ninja (${{ matrix.build_type }})
    runs-on: windows-latest
    needs: repo-metadata
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S . -B build -G "Ninja" -DCMAKE_CXX_COMPILER=clang++ -DSTEALTH_BUILD_EXAMPLES=ON -DSTEALTH_BUILD_TESTS=ON -DSTEALTH_BUILD_BENCHMARK=ON -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  linux-gcc:
    name: Linux GCC portable smoke
    runs-on: ubuntu-latest
    needs: repo-metadata
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC
        run: sudo apt-get update && sudo apt-get install -y g++-13 cmake

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_CXX_COMPILER=g++-13 -DSTEALTH_BUILD_EXAMPLES=OFF -DSTEALTH_BUILD_TESTS=ON -DSTEALTH_BUILD_BENCHMARK=OFF -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  linux-clang:
    name: Linux Clang portable smoke
    runs-on: ubuntu-latest
    needs: repo-metadata
    steps:
      - uses: actions/checkout@v4

      - name: Install Clang
        run: sudo apt-get update && sudo apt-get install -y clang cmake

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_CXX_COMPILER=clang++ -DSTEALTH_BUILD_EXAMPLES=OFF -DSTEALTH_BUILD_TESTS=ON -DSTEALTH_BUILD_BENCHMARK=OFF -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
