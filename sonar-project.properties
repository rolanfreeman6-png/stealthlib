# SonarCloud configuration for StealthLib
sonar.projectKey=rolanfreeman6-png_stealthlib
sonar.organization=rolanfreeman6-png
sonar.projectName=stealthlib
sonar.projectVersion=2.2.0

# Source directories
sonar.sources=stealthlib,tests,examples,benchmark

# Exclude third-party code and generated files
sonar.exclusions=tests/third_party/**,**/doctest.h,build_*,**/*.obj,**/*.pdb,tools/**

# C++ specific
sonar.cfamily.compile-commands=build/compile_commands.json

# Coverage
sonar.coverage.exclusions=tests/**,examples/**,benchmark/**,tests/third_party/**,tools/**

# C++ version
sonar.cfamily.cpp.version=20

# Thread count for analysis
sonar.cfamily.threads=2

# Domain-specific: PE parsing requires C-style arrays for struct overlays,
# void* for generic function pointers, macros for compile-time version.
# These are intentional design choices, not code smells.
sonar.cfamily.ruleset=false
